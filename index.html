<section class="checkout-box">
  <h3>Finalizar pedido</h3>

  <div class="checkout-grid">
    <input type="text" id="nombre" placeholder="Tu nombre" />
    <input type="text" id="telefono" placeholder="Tu teléfono" />
    <input type="text" id="direccion" placeholder="Tu dirección" />

    <select id="metodoEntrega">
      <option value="Delivery">Delivery</option>
      <option value="Retiro en local">Retiro en local</option>
    </select>

    <select id="metodoPago">
      <option value="Efectivo">Efectivo</option>
      <option value="Transferencia">Transferencia</option>
    </select>
  </div>

  <button id="btn-whatsapp" type="button">Finalizar por WhatsApp</button>
</section>

<style>
  .checkout-box {
    margin-top: 20px;
    padding: 16px;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    background: #111;
  }

  .checkout-box h3 {
    margin: 0 0 12px 0;
    font-size: 18px;
    color: #fff;
  }

  .checkout-grid {
    display: grid;
    gap: 10px;
    margin-bottom: 14px;
  }

  .checkout-grid input,
  .checkout-grid select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: #fff;
    outline: none;
    box-sizing: border-box;
  }

  #btn-whatsapp {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: #25d366;
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }

  #btn-whatsapp:hover {
    opacity: 0.95;
  }
</style>

<script>
  const TELEFONO_NEGOCIO = "56963376893";

  function obtenerCarritoSeguro() {
    try {
      if (Array.isArray(window.carrito) && window.carrito.length >= 0) {
        return window.carrito;
      }

      const posiblesKeys = ["carrito", "cart", "cartItems", "pedido"];
      for (const key of posiblesKeys) {
        const guardado = localStorage.getItem(key);
        if (guardado) {
          const parsed = JSON.parse(guardado);
          if (Array.isArray(parsed)) {
            return parsed;
          }
        }
      }

      return [];
    } catch (error) {
      console.error("Error leyendo carrito:", error);
      return [];
    }
  }

  function calcularTotalSeguro(carrito) {
    return carrito.reduce((acc, item) => {
      const precio = Number(item.precio || item.price || 0);
      const cantidad = Number(item.cantidad || item.qty || 1);
      return acc + (precio * cantidad);
    }, 0);
  }

  function limpiarTexto(valor) {
    return String(valor || "").trim();
  }

  function formatearMonedaCLP(numero) {
    try {
      return new Intl.NumberFormat("es-CL").format(Number(numero || 0));
    } catch {
      return String(numero || 0);
    }
  }

  function construirMensajeWhatsApp() {
    const carrito = obtenerCarritoSeguro();

    if (!carrito.length) {
      alert("Tu carrito está vacío.");
      return null;
    }

    const nombre = limpiarTexto(document.getElementById("nombre")?.value);
    const telefono = limpiarTexto(document.getElementById("telefono")?.value);
    const direccion = limpiarTexto(document.getElementById("direccion")?.value);
    const metodoEntrega = limpiarTexto(document.getElementById("metodoEntrega")?.value) || "Delivery";
    const metodoPago = limpiarTexto(document.getElementById("metodoPago")?.value) || "Efectivo";

    let mensaje = "🍔 *Nuevo pedido - La Felicitta*\n\n";

    if (nombre) {
      mensaje += "👤 *Nombre:* " + nombre + "\n";
    }

    if (telefono) {
      mensaje += "📞 *Teléfono:* " + telefono + "\n";
    }

    if (direccion) {
      mensaje += "📍 *Dirección:* " + direccion + "\n";
    }

    mensaje += "🛵 *Entrega:* " + metodoEntrega + "\n";
    mensaje += "💳 *Pago:* " + metodoPago + "\n\n";
    mensaje += "*Detalle del pedido:*\n";

    carrito.forEach((item) => {
      const nombreProducto = item.nombre || item.name || "Producto";
      const cantidad = Number(item.cantidad || item.qty || 1);
      const precio = Number(item.precio || item.price || 0);
      const subtotal = cantidad * precio;

      mensaje += "- " + cantidad + " x " + nombreProducto + " = $" + formatearMonedaCLP(subtotal) + "\n";

      if (item.nota) {
        mensaje += "  Nota: " + item.nota + "\n";
      }
    });

    const total = calcularTotalSeguro(carrito);

    mensaje += "\n💰 *Total:* $" + formatearMonedaCLP(total) + "\n";

    if (metodoPago.toLowerCase() === "transferencia") {
      mensaje += "\n*Datos para transferencia:*\n";
      mensaje += "La Felicitta\n";
      mensaje += "RUT: 267162433\n";
      mensaje += "Mercado Pago\n";
      mensaje += "Cuenta Vista\n";
      mensaje += "Número de cuenta: 1059389577\n";
      mensaje += "Correo: ventas@lafelicittacl.com\n";
    }

    mensaje += "\n📍 *Local:* Barros Arana 504, Iquique\n";
    mensaje += "📞 *Contacto:* +56 9 63376893";

    return mensaje;
  }

  function enviarPedidoWhatsApp() {
    try {
      const mensaje = construirMensajeWhatsApp();
      if (!mensaje) return;

      const url = "https://wa.me/" + TELEFONO_NEGOCIO + "?text=" + encodeURIComponent(mensaje);
      window.open(url, "_blank");
    } catch (error) {
      console.error("Error al abrir WhatsApp:", error);
      alert("Hubo un problema al abrir WhatsApp.");
    }
  }

  document.addEventListener("DOMContentLoaded", function () {
    const boton = document.getElementById("btn-whatsapp");

    if (boton) {
      boton.addEventListener("click", enviarPedidoWhatsApp);
    } else {
      console.warn("No se encontró el botón con id btn-whatsapp");
    }
  });
</script>
